<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!--
    코스 (COS) app icon — refined monogram
    Soft circular C (opens right) + a single red course-stroke inside.
    C stroke doubled (96) for stronger mark; ink charcoal + brand red.
  -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- C: center (244, 256), r=138, opening widened (±52°) so thick stroke still reads -->
  <path
    d="M 329 147 A 138 138 0 1 0 329 365"
    stroke="#171717"
    stroke-width="96"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Course stroke: soft diagonal, optically centered in the mouth -->
  <path
    d="M 198 186 C 236 232, 262 274, 300 318"
    stroke="#dc2626"
    stroke-width="40"
    stroke-linecap="round"
    fill="none"
  />
</svg>
