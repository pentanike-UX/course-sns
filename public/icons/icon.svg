<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 코스 (COS) app icon — black circular C + red S middle diagonal only.
       Full-bleed white square; motif kept inside the maskable safe zone. -->
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- Circular C (opening on the right) -->
  <path
    d="M 338 124 A 156 156 0 1 1 338 388"
    fill="none"
    stroke="#000000"
    stroke-width="72"
    stroke-linecap="round"
  />
  <!-- S central diagonal — the only red element -->
  <line
    x1="228"
    y1="198"
    x2="324"
    y2="314"
    stroke="#dc2626"
    stroke-width="58"
    stroke-linecap="round"
  />
</svg>
