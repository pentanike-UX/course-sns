<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- routdiary app icon — green brand square, white route from start-dot to pin.
       Full-bleed so the same art works for `any` and `maskable`; motif kept
       inside the central safe zone. Dots are explicit circles (ImageMagick's
       SVG renderer drops stroke-dasharray). -->
  <rect width="512" height="512" fill="#22c55e"/>
  <!-- dotted route: explicit stops along a gentle S-curve -->
  <circle cx="194" cy="352" r="13" fill="#ffffff"/>
  <circle cx="232" cy="318" r="13" fill="#ffffff"/>
  <circle cx="258" cy="276" r="13" fill="#ffffff"/>
  <circle cx="276" cy="232" r="13" fill="#ffffff"/>
  <circle cx="304" cy="196" r="13" fill="#ffffff"/>
  <!-- start dot -->
  <circle cx="150" cy="370" r="33" fill="#ffffff"/>
  <circle cx="150" cy="370" r="15" fill="#22c55e"/>
  <!-- destination pin -->
  <path d="M366 92 c -41 0 -71 30 -71 67 c 0 48 71 109 71 109 s 71 -61 71 -109 c 0 -37 -30 -67 -71 -67 Z"
        fill="#ffffff"/>
  <circle cx="366" cy="157" r="24" fill="#22c55e"/>
</svg>
